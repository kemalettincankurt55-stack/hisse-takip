name: Proxy'yi uyanık tut

# Render ücretsiz sunucu 15 dk hareketsizlikte uykuya geçer (ilk istek ~50 sn gecikir).
# Bu iş her ~10 dakikada bir /health'e ping atarak sunucuyu uyanık tutar.
on:
  schedule:
    - cron: '*/10 * * * *'   # her 10 dakikada bir (GitHub bazen birkaç dk geciktirir)
  workflow_dispatch:          # elle de tetiklenebilir

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Proxy /health ping
        run: |
          echo "Ping: $(date -u)"
          curl -sS -m 30 https://hisse-takip-proxy.onrender.com/health || true
